<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gold Shop</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="Logo" id="logo">
            </a>

            <!-- Mobile Menu Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= CAROUSEL ================= -->

   <div class="container-fluid p-0">

        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="https://battulaaljewels.com/website/images/product-banner.webp" class="d-block w-100"
                        alt="banner">
                </div>

                <div class="carousel-item">
                    <img src="https://siddhijewellers.co.in/wp-content/uploads/2024/02/silver-jewellery-banner-1929x760-1.png"
                        class="d-block w-100" alt="banner">
                </div>

                <div class="carousel-item">
                    <img src="https://shivdasjewellers.co.in/public/temp/10/1725089223.png" class="d-block w-100"
                        alt="banner">
                </div>

                <div class="carousel-item">
                    <img src="https://www.pateljewellers.com/pub/media/catalog/category/Final__Neckless_G.jpg"
                        class="d-block w-100" alt="banner">
                </div>

            </div>

            <!-- Previous -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>

            <!-- Next -->
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <!-- ================= PRICE SECTION ================= -->

 <section class="container mt-5">

    <!-- Heading -->
    <div class="text-center mb-4">
        <h1 class="display-5 price-heading">
            Today's Gold & Silver Price
        </h1>
        <p class="text-muted fs-5">
            Live precious metal rates
        </p>
    </div>

    <!-- Cards -->
    <div class="row justify-content-center g-4">

        <!-- Gold Card -->
        <div class="col-lg-4 col-md-6 col-12 d-flex">

            <div class="card price-card shadow border-0 w-100">

                <div class="card-body text-center p-4">

                    <i class="bi bi-gem fs-2 text-warning"></i>

                    <h2 class="gold-title mt-3">Gold Price</h2>

                    <p class="text-secondary fs-6">
                        Live Gold Rate
                    </p>

                    <h1 class="price-value text-dark" id="goldPrice">
                        Loading...
                    </h1>

                    <span class="badge bg-success px-3 py-2">
                        Live Updated
                    </span>

                </div>

            </div>

        </div>

        <!-- Silver Card -->
        <div class="col-lg-4 col-md-6 col-12 d-flex">

            <div class="card price-card shadow border-0 w-100">

                <div class="card-body text-center p-4">

                    <i class="bi bi-currency-rupee fs-2 text-secondary"></i>

                    <h2 class="silver-title mt-2">Silver Price</h2>

                    <p class="text-secondary fs-6">
                        Live Silver Rate
                    </p>

                    <h1 class="price-value text-dark" id="silverPrice">
                        Loading...
                    </h1>

                    <span class="badge bg-success px-3 py-2">
                        Live Updated
                    </span>

                </div>

            </div>

        </div>

    </div>

</section>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_KEY = "goldapi-7cfcd901c08942a85fd269c8efae45a0-io";

        // Helper function for fetching metal price
        function getMetalPrice(metal, elementId) {
            fetch(`https://www.goldapi.io/api/${metal}/INR`, {
                method: "GET",
                headers: {
                    "x-access-token": API_KEY,
                    "Content-Type": "application/json"
                }
            })
                .then(response => response.json())
                .then(data => {
                    document.getElementById(elementId).innerHTML =
                        "₹ " + data.price;
                })
                .catch(error => {
                    document.getElementById(elementId).innerHTML =
                        "Price Not Available";
                });
        }

        
      getMetalPrice("XAU", "goldPrice");

        // Silver Price
        getMetalPrice("XAG", "silverPrice");

    </script>
</body>

</html>
